name: build-and-release-mod

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1 — Validate structure, manifest schema, and entry script
  # ──────────────────────────────────────────────────────────────
  validate-and-package:
    name: Validate & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate mod
        run: python scripts/validate_mod.py --mod-path mods/example_mod

      - name: Package mod into zip
        run: python scripts/package_mod.py --mod-path mods/example_mod --output dist

      - name: Generate SHA256 checksums
        run: python scripts/generate_checksums.py --input dist

      - name: List build artifacts
        run: ls -lh dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mod-artifacts
          path: dist/*
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — Publish a GitHub Release (tag pushes only)
  # ──────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate-and-package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Re-package mod for release
        run: |
          python scripts/package_mod.py --mod-path mods/example_mod --output dist
          python scripts/generate_checksums.py --input dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256
            dist/*.build-info.json
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
