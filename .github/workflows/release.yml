name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Validate mod
        run: python -m pipeline.cli validate --mod-path examples/sample_mod

      - name: Package mod
        run: python -m pipeline.cli package --mod-path examples/sample_mod --output dist

      - name: Write build reports
        run: python -m pipeline.cli report --mod-path examples/sample_mod --artifacts dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256
            dist/*.build-info.json
            reports/*.json
            reports/*.md
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}