name: validate-and-package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate mod
        run: python scripts/validate_mod.py --mod-path mods/example_mod

      - name: Package mod into zip
        run: python scripts/package_mod.py --mod-path mods/example_mod --output dist

      - name: Generate SHA256 checksums
        run: python scripts/generate_checksums.py --input dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mod-artifacts
          path: dist/*
          retention-days: 30