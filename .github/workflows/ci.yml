name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Validate, Package & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate sample mod
        run: python -m pipeline.cli validate --mod-path examples/sample_mod

      - name: Package sample mod
        run: python -m pipeline.cli package --mod-path examples/sample_mod --output dist

      - name: Write build reports
        run: python -m pipeline.cli report --mod-path examples/sample_mod --artifacts dist

      - name: Run tests
        run: pytest

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mod-artifacts-ci
          path: |
            dist/*
            reports/*
          retention-days: 14